openapi: 3.0.3
info:
  title: Bank Cards REST API
  description: Bank cards service with admin and card-holder user operations, registration and JWT auth
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Authentication
    description: Зарегистрировать и войти в приложение
  - name: Управление банковскими картами
    description: CRUD и операции по картам
  - name: Управление держателями карт
    description: Управление карточными пользователями
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BankCardDto:
      type: object
      required: [cardNumber, cardHolderId]
      properties:
        cardNumber:
          type: string
          pattern: '^[0-9]{13,19}$'
          example: '1234567890123'
        cardHolderId:
          type: integer
          format: int64
          example: 1
    BankCardResponseDto:
      type: object
      required: [cardNumber]
      properties:
        cardNumber:
          type: string
          pattern: '^[0-9]{13,19}$'
          example: '1234567890123'
        cardHolderId:
          type: integer
          format: int64
          example: 1
    TransferRequest:
      type: object
      required: [fromCardNumber, toCardNumber, amount]
      properties:
        fromCardNumber:
          type: string
          pattern: '^[0-9]{13,19}$'
          example: '1234567890123'
        toCardNumber:
          type: string
          pattern: '^[0-9]{13,19}$'
          example: '3210987654321'
        amount:
          type: number
          format: decimal
          minimum: 0.01
          example: 100.50
    CardHolderRequestDto:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: 'Ivan Ivanov'
        email:
          type: string
          format: email
          example: 'ivan@example.com'
        password:
          type: string
          minLength: 8
          example: 'P4ssw0rd!'
    CardHolderResponseDto:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
          example: 1
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: 'ivan@example.com'
        password:
          type: string
          minLength: 8
          example: 'P4ssw0rd!'
    JwtAuthenticationResponse:
      type: object
      properties:
        token:
          type: string
          example: 'eyJhbGciOiJIUzUxMiJ9...'
    PagedBankCardResponseDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BankCardResponseDto'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            offset:
              type: integer
            paged:
              type: boolean
            unpaged:
              type: boolean
        totalElements:
          type: integer
        totalPages:
          type: integer
        last:
          type: boolean
        first:
          type: boolean
        numberOfElements:
          type: integer
        size:
          type: integer
        number:
          type: integer
        empty:
          type: boolean
security:
  - bearerAuth: []
paths:
  /auth/sign-in:
    post:
      tags:
        - Authentication
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtAuthenticationResponse'
        '401':
          description: Неверные учетные данные
  /api/v1/cards:
    post:
      tags:
        - Управление банковскими картами
      summary: Создание новой банковской карты
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankCardDto'
      responses:
        '201':
          description: Карта создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankCardDto'
        '400':
          description: Неправильные данные
        '403':
          description: Требуется роль ADMIN
  /api/v1/cards/{cardNumber}:
    parameters:
      - name: cardNumber
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9]{13,19}$'
    delete:
      tags:
        - Управление банковскими картами
      summary: Блокировка карты (админ)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Успешно заблокировано
        '404':
          description: Карта не найдена
        '403':
          description: Требуется роль ADMIN
    get:
      tags:
        - Управление банковскими картами
      summary: Получение баланса по номеру карты (админ)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Баланс карты
          content:
            application/json:
              schema:
                type: number
                format: decimal
                example: 1200.50
        '404':
          description: Карта не найдена
        '403':
          description: Требуется роль ADMIN
  /api/v1/my/cards:
    get:
      tags:
        - Управление банковскими картами
      summary: Получение списка карт для владельца (USER или ADMIN)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Страница карт
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedBankCardResponseDto'
        '403':
          description: Нет доступа
    post:
      tags:
        - Управление банковскими картами
      summary: Перевод между своими картами (USER или ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Перевод успешно выполнен
          content:
            text/plain:
              schema:
                type: string
                example: 'Перевод успешно выполнен'
        '400':
          description: Неверный запрос
        '403':
          description: Нет доступа
  /api/v1/my/cards/{cardNumber}:
    parameters:
      - name: cardNumber
        in: path
        required: true
        schema:
          type: string
          pattern: '^[0-9]{13,19}$'
    delete:
      tags:
        - Управление банковскими картами
      summary: Блокировка собственной карты (USER или ADMIN)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Успешно заблокировано
        '404':
          description: Карта не найдена
        '403':
          description: Нет доступа
  /api/v1/card-holders:
    post:
      tags:
        - Управление держателями карт
      summary: Создание нового держателя карт (ADMIN)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardHolderRequestDto'
      responses:
        '201':
          description: Держатель создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardHolderResponseDto'
        '400':
          description: Неверные данные
        '403':
          description: Требуется роль ADMIN
  /api/v1/card-holders/{cardHolderId}:
    parameters:
      - name: cardHolderId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      tags:
        - Управление держателями карт
      summary: Удаление держателя карт по ID (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Удалено
        '404':
          description: Держатель не найден
        '403':
          description: Требуется роль ADMIN
